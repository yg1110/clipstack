<svg width="100%" viewBox="148 151 464 464" xmlns="http://www.w3.org/2000/svg">
  <!-- Stack of 3 papers (bottom to top) -->
  <!-- Paper 3 (back) -->
  <rect x="230" y="260" width="280" height="340" rx="24" fill="#3a3a3c"/>
  <!-- Paper 2 (mid) -->
  <rect x="210" y="230" width="280" height="340" rx="24" fill="#48484a"/>
  <!-- Paper 1 (front) -->
  <rect x="190" y="200" width="280" height="340" rx="24" fill="#f2f2f7"/>

  <!-- Lines on front paper -->
  <rect x="224" y="264" width="210" height="14" rx="7" fill="#0a84ff"/>
  <rect x="224" y="296" width="170" height="12" rx="6" fill="#aeaeb2"/>
  <rect x="224" y="324" width="190" height="12" rx="6" fill="#aeaeb2"/>
  <rect x="224" y="352" width="140" height="12" rx="6" fill="#aeaeb2"/>

  <!-- Clip at top of paper -->
  <rect x="284" y="182" width="100" height="36" rx="10" fill="#636366"/>
  <rect x="300" y="166" width="68" height="30" rx="8" fill="#48484a"/>

  <!-- Arrow (copy/paste symbol) bottom right -->
  <circle cx="490" cy="480" r="80" fill="#0a84ff"/>
  <text x="490" y="502" text-anchor="middle" font-family="-apple-system" font-size="72" font-weight="700" fill="white">⌘</text>
</svg>
